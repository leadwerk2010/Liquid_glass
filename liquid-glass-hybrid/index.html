<!DOCTYPE html>
<html lang="en" data-force-glass-engine="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Hybrid UI</title>
    <meta
        name="description"
        content="Hybrid liquid glass demo that uses SVG filters in Chromium browsers and WebGL everywhere else."
    >
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="hero-section" id="auth-section">
        <nav class="navbar">
            <div class="logo">LOGO</div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#">About</a></li>
            </ul>
            <a href="#" class="btn-nav-login glass-panel glass-button" data-glass-source="#auth-section">Login</a>
        </nav>

        <div class="glass-panel registration-panel" data-glass-source="#auth-section">
            <button
                type="button"
                class="btn-close glass-panel glass-button"
                aria-label="Close"
                data-glass-source=".registration-panel"
            >
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>

            <h1 class="panel-title" id="auth-panel-title">Login</h1>

            <form action="#" class="auth-form" id="auth-form" autocomplete="off" data-auth-mode="login">
                <div class="input-group" data-auth-mode-only="register" hidden>
                    <input type="text" id="name" placeholder="Name" autocomplete="name" data-auth-required="register">
                    <span class="icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path>
                        </svg>
                    </span>
                </div>

                <div class="input-group">
                    <input type="email" id="email" placeholder="Email" autocomplete="email" required>
                    <span class="icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"></path>
                        </svg>
                    </span>
                </div>

                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
                    <span class="icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"></path>
                        </svg>
                    </span>
                </div>

                <div class="auth-options" data-auth-mode-only="login">
                    <label class="checkbox-group checkbox-group-inline" for="remember-me">
                        <input type="checkbox" id="remember-me">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="auth-inline-link">Forgot Password</a>
                </div>

                <div class="checkbox-group" data-auth-mode-only="register" hidden>
                    <input type="checkbox" id="terms" data-auth-required="register">
                    <label for="terms">I agree to the terms and conditions</label>
                </div>

                <button
                    type="submit"
                    class="btn-primary glass-panel glass-button"
                    id="auth-submit-button"
                    data-glass-source=".registration-panel"
                >
                    Login
                </button>

                <p class="auth-switch">
                    <span id="auth-switch-label">Don't have an account?</span>
                    <a href="#" id="auth-switch-link">Register</a>
                </p>
            </form>
        </div>
    </section>

    <section class="product-section">
        <h2 class="section-heading">Micro Interaction</h2>

        <div class="product-card glass-panel" data-glass-source=".product-section">
            <div class="product-image-container">
                <img src="assets/product.jpg" alt="Premium Wireless Headphones" class="product-image" loading="lazy">
                <button
                    type="button"
                    class="btn-favorite glass-panel glass-button"
                    aria-label="Toggle Favorite"
                    id="favorite-btn"
                    data-glass-source=".product-image"
                >
                    <svg class="heart-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                </button>
            </div>

            <div class="product-content">
                <h3 class="product-name">Noise Cancelling Pro</h3>
                <p class="product-description">Immersive sound with premium active noise cancellation.</p>
                <div class="product-footer">
                    <span class="product-price">$299.00</span>
                    <button type="button" class="btn-add-cart glass-panel glass-button" data-glass-source=".product-card">
                        Add to cart
                    </button>
                </div>
            </div>
        </div>
    </section>

    <script src="liquid-glass.js"></script>
    <script src="app.js"></script>
</body>
</html>
